  <!DOCTYPE html>
  <html>
  <head>
    <title>My Profile</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="../styles/nav.css">
    <link rel="stylesheet" href="../styles/profile.css">
  </head>

  <body>

  <div id="navbar-container"></div>

  <main class="profile-wrapper">

    <div class="profile-header">
      <h1>My Health Profile</h1>
      <p>Manage your personal health information</p>
    </div>

    <!-- VIEW MODE -->
    <div id="profileView" class="profile-card hidden"></div>

    <!-- EDIT MODE -->
    <form id="profileForm" class="profile-card">

      <h2>Personal Information</h2>

      <div class="grid-2">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required>
        </div>

        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" name="mobile">
        </div>

        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" name="dob">
        </div>

        <div class="form-group">
          <label>Height (cm)</label>
          <input type="number" name="height">
        </div>

        <div class="form-group">
          <label>Weight (kg)</label>
          <input type="number" name="weight">
        </div>
      </div>

      <h2>Health Information</h2>

      <div class="form-group">
        <label>Allergies</label>
        <textarea name="allergies"></textarea>
      </div>

      <div class="form-group">
        <label>Chronic Conditions</label>
        <textarea name="conditions"></textarea>
      </div>

      <div class="form-group">
        <label>Current Medications</label>
        <textarea name="medications"></textarea>
      </div>

      <button type="submit" class="save-btn">
        Save Profile
      </button>

    </form>

  </main>

  <script src="../scripts/profile.js"></script>
  <script src="../scripts/navbar.js"></script>
  </body>
  </html>
